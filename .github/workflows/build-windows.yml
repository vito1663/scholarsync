name: Build Windows

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  # 允许手动触发
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 安装 Qt 6.6.3（含 PDF、Quick、Network 等模块）
      - name: Install Qt 6.6.3
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.6.3'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          modules: 'qtpdf qtnetworkauth'
          cache: true

      # 3. 配置 MSVC 编译环境
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # 4. CMake 配置
      - name: Configure CMake
        run: |
          cmake -B build -S . `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}" `
            -G "NMake Makefiles"

      # 5. 编译
      - name: Build
        run: |
          cmake --build build --config Release --parallel

      # 6. 使用 windeployqt 打包所有依赖
      - name: Deploy with windeployqt
        run: |
          mkdir -p deploy
          copy build\ScholarSync.exe deploy\
          windeployqt `
            --release `
            --qmldir qml `
            --no-translations `
            --compiler-runtime `
            deploy\ScholarSync.exe

      # 7. 打包为 ZIP
      - name: Package ZIP
        run: |
          Compress-Archive -Path deploy\* -DestinationPath ScholarSync-Windows-x64.zip

      # 8. 上传构建产物（可在 Actions 页面下载）
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ScholarSync-Windows-x64
          path: ScholarSync-Windows-x64.zip
          retention-days: 30

  # 发布 Release（仅在推送 tag 时触发，如 v1.0.0）
  release:
    needs: build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ScholarSync-Windows-x64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ScholarSync-Windows-x64.zip
          generate_release_notes: true
          body: |
            ## ScholarSync Windows 版本
            
            ### 安装方法
            1. 下载 `ScholarSync-Windows-x64.zip` 并解压
            2. 运行 `ScholarSync.exe`
            3. 在设置页面填入 RAGFlow API Key
            
            ### 系统要求
            - Windows 10 / 11（64位）
            - 需要安装 [Visual C++ Redistributable](https://aka.ms/vs/17/release/vc_redist.x64.exe)
