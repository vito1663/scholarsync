name: Build Windows

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 安装 Qt 6.6.3
      - name: Install Qt 6.6.3
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.6.3'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          modules: 'qtpdf qtnetworkauth'
          cache: true

      # 3. 配置 MSVC 编译环境
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # 4. CMake 配置（使用 Ninja 加速编译）
      - name: Configure CMake
        shell: cmd
        run: |
          cmake -B build -S . ^
            -DCMAKE_BUILD_TYPE=Release ^
            -G "NMake Makefiles"

      # 5. 编译
      - name: Build
        shell: cmd
        run: |
          cmake --build build --config Release

      # 6. 查找 exe 并验证
      - name: Verify build output
        shell: powershell
        run: |
          Write-Host "=== Build directory contents ==="
          Get-ChildItem -Recurse build\ -Filter "*.exe" | Select-Object FullName, Length
          $exePath = Get-ChildItem -Recurse build\ -Filter "ScholarSync.exe" | Select-Object -First 1
          if ($exePath) {
            Write-Host "Found: $($exePath.FullName) ($($exePath.Length) bytes)"
          } else {
            Write-Error "ScholarSync.exe not found!"
            exit 1
          }

      # 7. 使用 windeployqt 打包所有依赖
      - name: Deploy with windeployqt
        shell: powershell
        run: |
          # 创建部署目录
          New-Item -ItemType Directory -Force -Path deploy | Out-Null

          # 查找编译好的 exe
          $exePath = Get-ChildItem -Recurse build\ -Filter "ScholarSync.exe" | Select-Object -First 1 -ExpandProperty FullName
          Write-Host "Deploying from: $exePath"
          Copy-Item $exePath deploy\

          # 获取 Qt 工具路径
          $qtBinDir = "${{ env.Qt6_DIR }}\..\..\..\bin"
          $windeployqt = Join-Path $qtBinDir "windeployqt.exe"
          Write-Host "windeployqt path: $windeployqt"

          # 获取 QML 源码目录（绝对路径）
          $qmlDir = "${{ github.workspace }}\qml"
          Write-Host "QML source dir: $qmlDir"

          # 执行 windeployqt
          & $windeployqt `
            --release `
            --qmldir "$qmlDir" `
            --no-translations `
            --compiler-runtime `
            deploy\ScholarSync.exe

          # 列出部署结果
          Write-Host "=== Deploy directory ==="
          Get-ChildItem deploy\ | Select-Object Name, Length

      # 8. 打包 ZIP（包含 vc_redist 安装包）
      - name: Package ZIP
        shell: powershell
        run: |
          # 下载 VC++ Redistributable
          $vcRedistUrl = "https://aka.ms/vs/17/release/vc_redist.x64.exe"
          Invoke-WebRequest -Uri $vcRedistUrl -OutFile "deploy\vc_redist.x64.exe" -UseBasicParsing

          # 创建启动说明
          @"
          ScholarSync - AI 学术阅读器
          ================================

          首次运行说明：
          1. 如果提示缺少运行库，请先运行 vc_redist.x64.exe 安装 VC++ 运行时
          2. 双击 ScholarSync.exe 启动
          3. 进入设置页面，填入 RAGFlow API Key

          系统要求：Windows 10 / 11 (64位)

          如遇问题，日志文件位于：
          %APPDATA%\ScholarSync\ScholarSync\scholarsync.log
          "@ | Out-File -FilePath "deploy\README.txt" -Encoding UTF8

          Compress-Archive -Path deploy\* -DestinationPath ScholarSync-Windows-x64.zip -Force
          Write-Host "Package size: $((Get-Item ScholarSync-Windows-x64.zip).Length / 1MB) MB"

      # 9. 上传构建产物
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ScholarSync-Windows-x64
          path: ScholarSync-Windows-x64.zip
          retention-days: 30

  # 发布 Release（仅在推送 tag 时触发，如 v1.0.0）
  release:
    needs: build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ScholarSync-Windows-x64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ScholarSync-Windows-x64.zip
          generate_release_notes: true
          body: |
            ## ScholarSync Windows 版本

            ### 安装方法
            1. 下载 `ScholarSync-Windows-x64.zip` 并解压到任意目录
            2. **首次运行**：先双击 `vc_redist.x64.exe` 安装 VC++ 运行时（已包含在压缩包内）
            3. 双击 `ScholarSync.exe` 启动
            4. 进入设置页面填入 RAGFlow API Key

            ### 系统要求
            - Windows 10 / 11（64位）

            ### 遇到问题？
            查看日志文件：`%APPDATA%\ScholarSync\ScholarSync\scholarsync.log`
