name: Build Windows

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Qt 6.6.3
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.6.3'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          modules: 'qtpdf qtnetworkauth'
          cache: true

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Pre-generate qrc_qml.cpp using Windows rcc.exe
        shell: powershell
        run: |
          # 找到 rcc.exe
          $rcc = "$env:QT_ROOT_DIR\bin\rcc.exe"
          if (-not (Test-Path $rcc)) {
            $rcc = (Get-Command "rcc.exe" -ErrorAction SilentlyContinue).Source
          }
          if (-not $rcc) {
            Write-Error "rcc.exe not found! QT_ROOT_DIR=$env:QT_ROOT_DIR"
            exit 1
          }
          Write-Host "Using rcc: $rcc"
          Write-Host "qml.qrc exists: $(Test-Path qml.qrc)"
          Get-Content qml.qrc

          # 用 Windows rcc.exe 生成 qrc_qml.cpp，放到 src/ 目录
          & "$rcc" --name qml_resources qml.qrc -o src\qrc_qml.cpp
          if ($LASTEXITCODE -ne 0) {
            Write-Error "rcc.exe failed with exit code $LASTEXITCODE"
            exit 1
          }
          $size = (Get-Item src\qrc_qml.cpp).Length
          Write-Host "Generated src\qrc_qml.cpp: $size bytes"
          if ($size -lt 50000) {
            Write-Warning "qrc_qml.cpp is too small ($size bytes), QML files may not be found!"
            Get-Content qml.qrc
          }

      - name: Configure CMake
        shell: cmd
        run: |
          cmake -B build -S . ^
            -DCMAKE_BUILD_TYPE=Release ^
            -G "Ninja" ^
            -DCMAKE_C_COMPILER=cl ^
            -DCMAKE_CXX_COMPILER=cl

      - name: Build
        shell: cmd
        run: cmake --build build --config Release

      - name: Verify exe size
        shell: powershell
        run: |
          $exe = Get-ChildItem -Recurse build -Filter "ScholarSync.exe" | Select-Object -First 1
          if (-not $exe) { Write-Error "ScholarSync.exe not found!"; exit 1 }
          Write-Host "ScholarSync.exe: $($exe.Length) bytes"
          if ($exe.Length -lt 250000) {
            Write-Error "exe too small ($($exe.Length) bytes) - QML resources not embedded!"
            exit 1
          }
          Write-Host "exe size OK - QML resources embedded successfully"

      - name: Deploy with windeployqt
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path deploy | Out-Null
          $exe = Get-ChildItem -Recurse build -Filter "ScholarSync.exe" | Select-Object -First 1 -ExpandProperty FullName
          Copy-Item $exe deploy\

          $wdqt = "$env:QT_ROOT_DIR\bin\windeployqt.exe"
          if (-not (Test-Path $wdqt)) {
            $wdqt = (Get-Command "windeployqt.exe" -ErrorAction SilentlyContinue).Source
          }
          if (-not $wdqt) { Write-Error "windeployqt not found!"; exit 1 }
          Write-Host "Using: $wdqt"
          Write-Host "QT_ROOT_DIR: $env:QT_ROOT_DIR"

          # 关键修复：添加 --qmldir 参数，让 windeployqt 扫描源码 qml 目录
          # 这样它才能知道需要部署哪些 QML 模块（QtQuick.Controls, QtQuick.Pdf 等）
          & "$wdqt" --release --no-translations --compiler-runtime `
            --qmldir qml `
            "deploy\ScholarSync.exe"

          Write-Host "windeployqt exit code: $LASTEXITCODE"

      - name: Manually copy Qt6PdfQuick.dll and QML modules
        shell: powershell
        run: |
          $qtRoot = $env:QT_ROOT_DIR
          Write-Host "Qt root: $qtRoot"

          # Qt6PdfQuick.dll - windeployqt 有时漏掉这个
          $pdfQuickDll = "$qtRoot\bin\Qt6PdfQuick.dll"
          if (Test-Path $pdfQuickDll) {
            Copy-Item $pdfQuickDll deploy\
            Write-Host "Copied Qt6PdfQuick.dll"
          } else {
            Write-Warning "Qt6PdfQuick.dll not found at $pdfQuickDll"
          }

          # 确保 qml 目录存在
          New-Item -ItemType Directory -Force -Path "deploy\qml" | Out-Null

          # 需要的 QML 模块列表（根据 QML 文件中的 import 语句）
          $qmlModules = @(
            "QtQuick",
            "QtQuick\Controls",
            "QtQuick\Controls\Basic",
            "QtQuick\Controls\impl",
            "QtQuick\Layouts",
            "QtQuick\Dialogs",
            "QtQuick\Dialogs\quickimpl",
            "QtQuick\NativeStyle",
            "QtQuick\Templates",
            "QtQuick\Window",
            "QtQuick\Pdf",
            "Qt\labs\platform",
            "QtQml",
            "QtQml\Models",
            "QtQml\WorkerScript"
          )

          $qtQmlDir = "$qtRoot\qml"
          Write-Host "Qt QML dir: $qtQmlDir"

          foreach ($mod in $qmlModules) {
            $src = "$qtQmlDir\$mod"
            $dst = "deploy\qml\$mod"
            if (Test-Path $src) {
              New-Item -ItemType Directory -Force -Path $dst | Out-Null
              # 复制 DLL 和 qmldir 文件
              Get-ChildItem $src -File | Where-Object { $_.Extension -in @('.dll', '.qmltypes', '') -or $_.Name -eq 'qmldir' } | ForEach-Object {
                Copy-Item $_.FullName $dst\
              }
              Write-Host "Deployed QML module: $mod"
            } else {
              Write-Warning "QML module not found: $src"
            }
          }

          Write-Host "Deploy done. Top-level files:"
          Get-ChildItem deploy | Select-Object Name, Length
          Write-Host "QML modules deployed:"
          Get-ChildItem "deploy\qml" -Recurse -Directory | Select-Object FullName

      - name: Verify QML modules
        shell: powershell
        run: |
          # 验证关键 QML 模块是否存在
          $required = @(
            "deploy\qml\QtQuick\Controls\qmldir",
            "deploy\qml\QtQuick\Layouts\qmldir",
            "deploy\qml\QtQuick\Pdf\qmldir"
          )
          $allOk = $true
          foreach ($f in $required) {
            if (Test-Path $f) {
              Write-Host "OK: $f"
            } else {
              Write-Warning "MISSING: $f"
              $allOk = $false
            }
          }
          if (-not $allOk) {
            Write-Warning "Some QML modules are missing - app may fail to start"
          } else {
            Write-Host "All required QML modules present"
          }

      - name: Create README
        shell: powershell
        run: |
          $content = "ScholarSync - AI Academic Reader`r`n"
          $content += "================================`r`n`r`n"
          $content += "How to run:`r`n"
          $content += "1. Run vc_redist.x64.exe first (if missing VC++ runtime)`r`n"
          $content += "2. Double-click ScholarSync.exe`r`n"
          $content += "3. Go to Settings, enter your RAGFlow API Key`r`n`r`n"
          $content += "Requirements: Windows 10/11 (64-bit)`r`n`r`n"
          $content += "Log file: %APPDATA%\ScholarSync\ScholarSync\scholarsync.log`r`n"
          $content += "(Also check scholarsync.log in the same folder as ScholarSync.exe)`r`n"
          Set-Content -Path "deploy\README.txt" -Value $content -Encoding UTF8

      - name: Download vc_redist
        shell: powershell
        run: |
          try {
            Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vc_redist.x64.exe" -OutFile "deploy\vc_redist.x64.exe" -UseBasicParsing -TimeoutSec 60
            Write-Host "vc_redist.x64.exe downloaded"
          } catch {
            Write-Host "Download failed (non-fatal): $_"
          }

      - name: Package ZIP
        shell: powershell
        run: |
          Compress-Archive -Path deploy\* -DestinationPath ScholarSync-Windows-x64.zip -Force
          $mb = [math]::Round((Get-Item ScholarSync-Windows-x64.zip).Length / 1MB, 1)
          Write-Host "Package: $mb MB"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ScholarSync-Windows-x64
          path: ScholarSync-Windows-x64.zip
          retention-days: 30

  release:
    needs: build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ScholarSync-Windows-x64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ScholarSync-Windows-x64.zip
          generate_release_notes: true
          body: |
            ## ScholarSync Windows Release

            ### Installation
            1. Download and extract `ScholarSync-Windows-x64.zip`
            2. Run `vc_redist.x64.exe` first (if needed)
            3. Launch `ScholarSync.exe`
            4. Go to Settings and enter your RAGFlow API Key

            ### Requirements
            - Windows 10 / 11 (64-bit)

            ### Troubleshooting
            Log file: `%APPDATA%\ScholarSync\ScholarSync\scholarsync.log`
